<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>job-os-next</title>
</head>
<script>
  window.addEventListener('error', function (e) {
    document.body.innerHTML += '<div style="position:fixed;top:0;left:0;background:red;color:white;padding:20px;z-index:9999;">Global Error: ' + e.message + '</div>';
  });
  window.addEventListener('unhandledrejection', function (e) {
    document.body.innerHTML += '<div style="position:fixed;top:50px;left:0;background:orange;color:white;padding:20px;z-index:9999;">Promise Error: ' + e.reason + '</div>';
  });
</script>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
