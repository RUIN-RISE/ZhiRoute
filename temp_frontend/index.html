<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>职通车 · AI 智能招聘</title>

  <!-- 字体：Space Grotesk（大标题）+ Plus Jakarta Sans（正文/小组件）+ JetBrains Mono（代码/终端） -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet" />

<script>
  window.addEventListener('error', function (e) {
    document.body.innerHTML += '<div style="position:fixed;top:0;left:0;background:red;color:white;padding:20px;z-index:9999;">Global Error: ' + e.message + '</div>';
  });
  window.addEventListener('unhandledrejection', function (e) {
    document.body.innerHTML += '<div style="position:fixed;top:50px;left:0;background:orange;color:white;padding:20px;z-index:9999;">Promise Error: ' + e.reason + '</div>';
  });
</script>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
